<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0F766E">
  <title>العربية التفاعلية — Media Pembelajaran Bahasa Arab Interaktif</title>
  <meta name="description" content="Media pembelajaran bahasa Arab interaktif untuk SMA Islam Assyafiiyah 02. Dialog, kosakata, dan latihan soal.">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/dark.css">
  <link rel="icon" href="assets/images/logo-mark.svg">

<body>
  <div id="root"></div>

  <!-- ═══ Runtime: React + Babel ═══ -->

          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
          crossorigin="anonymous"></script>

  <!-- ═══ TTS Helper ═══ -->
  <script src="js/lib/tts.js"></script>

  <!-- ═══ Speech Recognition Helper ═══ -->
  <script src="js/lib/speechRecognition.js"></script>

  <!-- ═══ Supabase ═══ -->

  <script src="js/lib/supabase.js"></script>

  <script src="js/data.js"></script>
